name: Stellar Payment dApp CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install Dependencies
      run: npm install --legacy-peer-deps --ignore-scripts
    - name: Run Frontend Tests
      run: npx vitest run

  test-contracts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: wasm32-unknown-unknown
        profile: minimal
        override: true
    - name: Run Contract Tests
      working-directory: ./contracts/crowdfund
      run: cargo test

  build-and-commit-wasm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        target: wasm32-unknown-unknown
        profile: minimal
        override: true
    - name: Build Contract
      working-directory: ./contracts/crowdfund
      run: cargo build --target wasm32-unknown-unknown --release > build.log 2>&1 || true
    - name: Commit WASM
      run: |
        cp contracts/crowdfund/build.log ./ || true
        cp contracts/crowdfund/target/wasm32-unknown-unknown/release/stellar_crowdfund.wasm ./ || true
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add stellar_crowdfund.wasm build.log || true
        git commit -m "chore: Build and add stellar_crowdfund.wasm [skip ci]" || echo "No changes"
        git push

  deploy-frontend:
    needs: [build-and-commit-wasm]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
      with:
        ref: main
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install Dependencies
      run: npm install --legacy-peer-deps --ignore-scripts
    - name: Build
      run: npm run build
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
